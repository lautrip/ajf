<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AJF Live Brief & Worldcup</title>
    
    <!-- Google Fonts: Outfit (sans) & JetBrains Mono (monospace) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Ambient subtle background glow -->
        <div class="ambient-glow"></div>

        <!-- App Header -->
        <header class="app-header">
            <div class="header-main">
                <h1 id="app-title" class="app-title">AJF Live Brief</h1>
                <div class="header-actions">
                    <button id="btn-refresh" class="action-btn" title="Recargar">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="header-sub">
                <div id="live-clock" class="live-clock">--:--:--</div>
                <div class="sync-status">
                    <span class="pulse-dot"></span>
                </div>
            </div>
        </header>

        <!-- Compact State Pill (Dynamic Island Concept) -->
        <section id="status-pill-container" class="status-pill-container">
            <div id="status-pill" class="status-pill" title="Haga clic para ver detalles">
                <span class="pill-dot"></span>
                <span id="pill-content" class="pill-content">Conectando con Google Sheet...</span>
            </div>
        </section>

        <!-- Dynamic Controls (Search & Category Filters) -->
        <section class="controls-section">
            <div class="search-wrapper">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.602 10.602Z" />
                </svg>
                <input type="text" id="search-input" placeholder="Buscar..." autocomplete="off">
                <button id="search-clear-btn" class="search-clear-btn">✕</button>
            </div>
            
            <div class="category-tabs">
                <button class="tab-btn active" data-category="all">Todos</button>
                <button class="tab-btn" data-category="trip">Trip ✈️</button>
                <button class="tab-btn" data-category="worldcup">Partido ⚽</button>
                <button class="tab-btn" data-category="meetings">Reuniones 💼</button>
            </div>
        </section>

        <!-- Unified Timeline List -->
        <main class="timeline-container">
            <!-- Filter Status Info -->
            <div class="filter-status-bar" id="filter-status" style="display: none;">
                <span class="status-text">Filtro activo</span>
                <button id="btn-clear-filters" class="clear-filters-btn">Limpiar</button>
            </div>

            <!-- Loading Skeleton -->
            <div id="timeline-skeleton" class="timeline-skeleton">
                <div class="skeleton-day-header"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-day-header"></div>
                <div class="skeleton-row"></div>
            </div>

            <!-- Empty State -->
            <div id="timeline-empty" class="timeline-empty-state" style="display: none;">
                <div class="empty-icon">🔍</div>
                <h3>Sin resultados</h3>
                <p>Prueba cambiando los filtros o la búsqueda.</p>
            </div>

            <!-- Vertical Timeline Grouped by Days -->
            <div id="timeline-list" class="timeline-list" style="display: none;">
                <!-- Days and events injected dynamically here -->
            </div>
        </main>

        <!-- Minimal Footer -->
        <footer class="app-footer">
            <p>AJF Schedule &bull; Actualizado en tiempo real</p>
        </footer>
    </div>


    <script src="app.js"></script>
</body>
</html>
