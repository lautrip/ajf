<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AJF Live Brief & Worldcup</title>
    
    <!-- Google Fonts: Outfit (sans) & JetBrains Mono (monospace) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Favicon / Site Icon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Ambient subtle background glow -->
        <div class="ambient-glow"></div>

        <!-- Sticky Header & Controls Group -->
        <div class="sticky-header-group">
            <!-- Dynamic Controls (Search first, then other controls) -->
            <div class="search-wrapper">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.602 10.602Z" />
                </svg>
                <input type="text" id="search-input" placeholder="Buscar..." autocomplete="off">
                <button id="search-clear-btn" class="search-clear-btn">✕</button>
            </div>

            <!-- Compact State Pill (Dynamic Island Concept) -->
            <section id="status-pill-container" class="status-pill-container">
                <div id="status-pill" class="status-pill" title="Haga clic para ver detalles">
                    <span class="pill-dot"></span>
                    <span id="pill-content" class="pill-content">Conectando con Google Sheet...</span>
                </div>
            </section>

            <section class="controls-section">
                <div class="category-tabs">
                    <button class="tab-btn active" data-category="all" title="Todos">🌐</button>
                    <button class="tab-btn" data-category="trip" title="Trip">✈️</button>
                    <button class="tab-btn" data-category="evento-ajf" title="AJF Events"><img src="carpincho.png" alt="🦫" class="tab-mascot-icon"></button>
                    <button class="tab-btn" data-category="worldcup" title="Game">⚽</button>
                    <button class="tab-btn" data-category="evento" title="Evento">📅</button>
                    <button class="tab-btn" data-category="fiesta" title="Fiesta">🎉</button>
                    <button class="tab-btn" data-category="contenido" title="Contenido">📷</button>
                    <button class="tab-btn" data-category="freetime" title="Freetime">🆓</button>
                    <button class="tab-btn" data-category="comida" title="Comida">🍽️</button>
                </div>

                <div class="toggles-container">
                    <div class="toggle-wrapper">
                        <span class="toggle-label">Partidos no-ARG ⚽</span>
                        <label class="switch">
                            <input type="checkbox" id="toggle-non-arg">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="toggle-wrapper">
                        <span class="toggle-label">Eventos rivales 👾</span>
                        <label class="switch">
                            <input type="checkbox" id="toggle-rival">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
            </section>
        </div>

        <!-- Unified Timeline List -->
        <main class="timeline-container">
            <!-- Filter Status Info -->
            <div class="filter-status-bar" id="filter-status" style="display: none;">
                <span class="status-text" id="status-query">Filtro activo</span>
                <button id="btn-clear-filters" class="clear-filters-btn">Limpiar</button>
            </div>

            <!-- Loading Skeleton -->
            <div id="timeline-skeleton" class="timeline-skeleton">
                <div class="skeleton-day-header"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-day-header"></div>
                <div class="skeleton-row"></div>
            </div>

            <!-- Empty State -->
            <div id="timeline-empty" class="timeline-empty-state" style="display: none;">
                <div class="empty-icon">🔍</div>
                <h3>Sin resultados</h3>
                <p>Prueba cambiando los filtros o la búsqueda.</p>
            </div>

            <!-- Vertical Timeline Grouped by Days -->
            <div id="timeline-list" class="timeline-list" style="display: none;">
                <!-- Days and events injected dynamically here -->
            </div>
        </main>

        <!-- Minimal Footer -->
        <footer class="app-footer">
            <p>AJF Schedule &bull; Actualizado en tiempo real</p>
        </footer>
    </div>


    <script src="app.js"></script>
</body>
</html>
